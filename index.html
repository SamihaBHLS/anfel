<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Birthday Time Capsule · Anfal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Pinyon+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --ivory:      #FAF6EF;
      --parchment:  #F2EBE0;
      --linen:      #E6D9CB;
      --stone:      #C8B9A6;
      --mocha:      #7D6854;
      --umber:      #4A3728;
      --rosegold:   #C9A882;
      --blush:      #E8D5CA;
      --champagne:  #D9C3A5;
      --ink:        #2B1F14;
 
      --serif:  'Playfair Display', Georgia, serif;
      --script: 'Pinyon Script', cursive;
      --sans:   'DM Sans', sans-serif;
      --ease:   cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
 
    html, body {
      min-height: 100vh;
      font-family: var(--sans);
      background: var(--ivory);
      color: var(--ink);
      overflow-x: hidden;
      cursor: none;
    }
 
    /* grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9000;
      opacity: 0.55;
    }
 
    /* ===== CURSOR ===== */
    #cur { position: fixed; width: 8px; height: 8px; background: var(--rosegold); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); mix-blend-mode: multiply; }
    #cur-ring { position: fixed; width: 32px; height: 32px; border: 1.5px solid var(--rosegold); border-radius: 50%; pointer-events: none; z-index: 99998; transform: translate(-50%,-50%); opacity: 0.45; transition: width .3s var(--ease), height .3s var(--ease), opacity .2s; }
 
    /* ===== AMBIENT BACKGROUND ===== */
    .bg-blob {
      position: fixed; border-radius: 50%; pointer-events: none; filter: blur(70px); z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(201,168,130,.13) 0%, transparent 70%); top: -100px; right: -100px; animation: drift1 12s ease-in-out infinite alternate; }
    .blob2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(232,213,202,.15) 0%, transparent 70%); bottom: -80px; left: -80px; animation: drift2 15s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(30px, 40px); } }
    @keyframes drift2 { to { transform: translate(-20px, -30px); } }
 
    /* ===== CARD SHELL ===== */
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }
 
    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(250,246,239,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid var(--linen);
      border-radius: 4px;
      box-shadow: 0 30px 80px rgba(74,55,40,0.08), 0 2px 6px rgba(74,55,40,0.04);
      overflow: hidden;
      position: relative;
    }
 
    /* corner ornaments on card */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--linen);
      border-style: solid;
      z-index: 2;
    }
    .card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }
 
    .card-inner { padding: 3rem 2.8rem; position: relative; z-index: 1; }
 
    /* ===== STEP CONTENT ===== */
    .step { animation: stepIn 0.6s var(--ease) both; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* eyebrow label */
    .eyebrow {
      font-family: var(--sans);
      font-size: 0.58rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 0.5rem;
    }
 
    /* display heading */
    .display-h {
      font-family: var(--serif);
      font-size: clamp(1.7rem, 5vw, 2.6rem);
      font-weight: 400;
      color: var(--umber);
      line-height: 1.25;
      letter-spacing: -0.3px;
    }
    .display-h em { font-style: italic; color: var(--mocha); }
 
    /* script accent */
    .script-accent {
      font-family: var(--script);
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      color: var(--mocha);
      line-height: 1.1;
    }
 
    /* body text */
    .body-text {
      font-family: var(--sans);
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--mocha);
      font-weight: 300;
    }
 
    /* divider */
    .deco-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.4rem 0;
    }
    .deco-divider::before, .deco-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--linen);
    }
    .deco-divider span { font-size: 0.55rem; letter-spacing: 3px; color: var(--stone); }
 
    /* primary button */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 12px 32px;
      background: var(--umber);
      color: var(--champagne);
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: none;
      transition: all 0.4s var(--ease);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--rosegold);
      transform: translateX(-100%);
      transition: transform 0.5s var(--ease);
    }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover { color: var(--umber); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(74,55,40,0.12); }
    .btn-primary span, .btn-primary .ico { position: relative; z-index: 1; }
 
    /* ghost button */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 10px 28px;
      background: transparent;
      color: var(--mocha);
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1px solid var(--linen);
      border-radius: 2px;
      cursor: none;
      transition: all 0.35s var(--ease);
    }
    .btn-ghost:hover { background: var(--umber); color: var(--champagne); border-color: var(--umber); transform: translateY(-2px); }
 
    /* quoted memory card */
    .quote-block {
      border-left: 2px solid var(--rosegold);
      padding: 1rem 1.4rem;
      background: var(--parchment);
      border-radius: 0 2px 2px 0;
      margin: 1.5rem 0;
    }
    .quote-block p {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--umber);
      line-height: 1.6;
    }
 
    /* quality rows */
    .quality-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--linen);
      opacity: 0;
      transform: translateX(-12px);
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .quality-row:first-child { border-top: 1px solid var(--linen); }
    .quality-row.visible { opacity: 1; transform: translateX(0); }
 
    .q-icon {
      width: 36px; height: 36px;
      background: var(--parchment);
      border: 1px solid var(--linen);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .q-text .q-title {
      font-family: var(--serif);
      font-size: 0.95rem;
      color: var(--umber);
      margin-bottom: 0.1rem;
    }
    .q-text .q-desc {
      font-size: 0.78rem;
      color: var(--mocha);
      font-weight: 300;
      line-height: 1.5;
    }
 
    /* date badge */
    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--parchment);
      border: 1px solid var(--linen);
      border-radius: 2px;
      padding: 6px 16px;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 1.5rem;
    }
 
    /* large name display */
    .name-display {
      font-family: var(--script);
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      background: linear-gradient(135deg, var(--umber), var(--rosegold), var(--champagne), var(--rosegold));
      background-size: 200% 200%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 4s ease infinite;
      line-height: 1;
    }
    @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
 
    /* later note reveal */
    .later-reveal {
      background: var(--parchment);
      border: 1px solid var(--linen);
      border-radius: 2px;
      padding: 1.2rem 1.4rem;
      margin-top: 1.2rem;
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--umber);
      line-height: 1.6;
      display: none;
      animation: stepIn 0.5s var(--ease) both;
    }
 
    /* progress dots */
    .progress-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2rem;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--linen);
      transition: background 0.4s, transform 0.3s var(--spring);
    }
    .dot.active { background: var(--rosegold); transform: scale(1.4); }
    .dot.done { background: var(--champagne); }
 
    /* sparkle emitter */
    .sparkle {
      position: fixed; pointer-events: none; z-index: 8999;
      animation: spkl 1.2s var(--ease) forwards;
    }
    @keyframes spkl {
      from { opacity: .9; transform: translateY(0) scale(.5); }
      to   { opacity: 0;  transform: translateY(-90px) scale(1.1); }
    }
 
    /* hourglass icon */
    .icon-large { font-size: 2.2rem; }
 
    /* pause message */
    .pause-text {
      font-family: var(--serif);
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      font-style: italic;
      color: var(--mocha);
      line-height: 1.4;
      opacity: 0;
      transition: opacity 1s var(--ease);
    }
    .pause-text.show { opacity: 1; }
 
    .sub-text {
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--stone);
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.8s var(--ease) 0.5s;
      margin-top: 0.5rem;
    }
    .sub-text.show { opacity: 1; }
 
    /* footer note */
    .card-footer {
      background: var(--parchment);
      border-top: 1px solid var(--linen);
      padding: 0.75rem 2.8rem;
      font-size: 0.62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--stone);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
 
    @media (max-width: 540px) {
      .card-inner { padding: 2.2rem 1.8rem; }
    }
  </style>
</head>
<body>
 
<div id="cur"></div>
<div id="cur-ring"></div>
 
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
 
<div class="stage">
  <div class="card">
    <div class="card-inner">
      <!-- progress -->
      <div class="progress-dots" id="dots"></div>
      <!-- dynamic step content -->
      <div id="step-mount"></div>
    </div>
    <div class="card-footer">
      <span>✦</span>
      <span>a time capsule for anfal</span>
      <span>✦</span>
    </div>
  </div>
</div>
 
<script>
  // ===== CURSOR =====
  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
  (function loop(){ rx+=(mx-rx)*.1; ry+=(my-ry)*.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
  document.querySelectorAll('button').forEach(b=>{ b.addEventListener('mouseenter',()=>{ ring.style.width='48px'; ring.style.height='48px'; }); b.addEventListener('mouseleave',()=>{ ring.style.width='32px'; ring.style.height='32px'; }); });
 
  // ===== SPARKLES =====
  const SPK = ['✨','🤍','🌸','💫','✦','◇','·'];
  function sparkle(n=10,set=SPK){
    for(let i=0;i<n;i++){
      setTimeout(()=>{
        const el=document.createElement('div');
        el.className='sparkle';
        el.textContent=set[Math.floor(Math.random()*set.length)];
        el.style.left=(15+Math.random()*70)+'vw';
        el.style.bottom=(5+Math.random()*25)+'vh';
        el.style.fontSize=(0.8+Math.random()*0.8)+'rem';
        el.style.animationDuration=(0.9+Math.random()*0.6)+'s';
        document.body.appendChild(el);
        el.addEventListener('animationend',()=>el.remove());
      }, i*55);
    }
  }
 
  // ===== STEPS =====
  const TOTAL = 6;
  let step = 0;
  const mount = document.getElementById('step-mount');
  const dotsEl = document.getElementById('dots');
 
  function renderDots(){
    dotsEl.innerHTML = '';
    for(let i=0;i<TOTAL;i++){
      const d=document.createElement('div');
      d.className='dot'+(i===step?' active':i<step?' done':'');
      dotsEl.appendChild(d);
    }
  }
 
  function go(n){ step=n; renderDots(); render(); }
 
  function btn(label, arrow=true){
    return `<button class="btn-primary" onclick="go(${step+1})"><span>${label}</span>${arrow?'<span class="ico">→</span>':''}</button>`;
  }
 
  function render(){
    mount.innerHTML='';
    const div=document.createElement('div');
    div.className='step';
    div.innerHTML = steps[step]();
    mount.appendChild(div);
    // re-attach dynamic listeners
    if(window.__stepInit) window.__stepInit();
    window.__stepInit = null;
  }
 
  const steps = [
    // 0 — open
    ()=>`
      <div style="text-align:center">
        <p class="eyebrow">A gift wrapped in time</p>
        <h1 class="display-h" style="margin-bottom:.5rem">A Birthday<br><em>Time Capsule</em></h1>
        <div class="deco-divider"><span>✦ ✦ ✦</span></div>
        <p class="body-text" style="margin-bottom:2rem">Something made to be opened today — and only today.<br>This moment has been waiting for you.</p>
        ${btn('Open the Capsule')}
      </div>
    `,
 
    // 1 — date & name reveal
    ()=>{
      const d=new Date();
      const ds=d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
      return `
        <div style="text-align:center">
          <div class="date-badge">📅 &nbsp; ${ds}</div>
          <p class="eyebrow">sealed & delivered for</p>
          <div class="name-display">Anfal</div>
          <div class="deco-divider" style="margin:1.2rem 0"><span>✦</span></div>
          <p class="body-text" style="margin-bottom:2rem">Today is yours. Every bit of it.<br>Let's open this together.</p>
          ${btn('Open First Note')}
        </div>
      `;
    },
 
    // 2 — sweet reminder
    ()=>`
      <div>
        <p class="eyebrow">Note I — What to Remember</p>
        <h2 class="display-h" style="margin-bottom:1.5rem">Something I need<br>you to <em>hold onto.</em></h2>
        <div class="quote-block">
          <p>"No matter what this year brought — you are someone worth celebrating. Fully, completely, exactly as you are."</p>
        </div>
        <p class="body-text" style="margin-bottom:2rem">Not because of what you do. Not because of how you show up. But simply because you exist — and that has always been enough.</p>
        ${btn('Keep Going')}
      </div>
    `,
 
    // 3 — qualities
    ()=>{
      const qualities = [
        ['🌿','Your Presence','The quiet warmth you carry into every room — effortless, real, and rare.'],
        ['🕊️','Your Kindness','The kind that notices small things. That shows up without being asked.'],
        ['✨','Your Light','Even on hard days, you find a way. Everyone around you sees it — even when you don\'t.'],
        ['💫','Your Heart','Deep, loyal, genuine. The kind of heart the world needs more of.'],
      ];
      window.__stepInit = ()=>{
        let revealed = 0;
        const rows = document.querySelectorAll('.quality-row');
        const revBtn = document.getElementById('rev-btn');
        const nextWrap = document.getElementById('next-wrap');
        if(!revBtn) return;
        revBtn.addEventListener('click',()=>{
          if(revealed < rows.length){
            rows[revealed].classList.add('visible');
            revealed++;
            if(revealed === rows.length){
              revBtn.textContent = '✦ All revealed';
              revBtn.disabled = true;
              revBtn.style.opacity = '0.5';
              setTimeout(()=>{ nextWrap.style.display='block'; }, 400);
              sparkle(14);
            }
          }
        });
      };
      return `
        <div>
          <p class="eyebrow">Note II — What Makes You, You</p>
          <h2 class="display-h" style="margin-bottom:1.5rem">The things I quietly<br><em>admire about you.</em></h2>
          <div id="q-list">
            ${qualities.map(([icon,title,desc])=>`
              <div class="quality-row">
                <div class="q-icon">${icon}</div>
                <div class="q-text">
                  <div class="q-title">${title}</div>
                  <div class="q-desc">${desc}</div>
                </div>
              </div>
            `).join('')}
          </div>
          <div style="text-align:center;margin:1.5rem 0">
            <button class="btn-ghost" id="rev-btn">Reveal qualities</button>
          </div>
          <div id="next-wrap" style="display:none;text-align:center">${btn('One More Thing')}</div>
        </div>
      `;
    },
 
    // 4 — pause / emotional
    ()=>{
      window.__stepInit = ()=>{
        setTimeout(()=>{
          const pt = document.getElementById('pause-text');
          const st = document.getElementById('sub-text');
          if(pt) pt.classList.add('show');
          if(st) st.classList.add('show');
        }, 400);
        setTimeout(()=>{
          const nw = document.getElementById('nxt-pause');
          if(nw) nw.style.display='block';
        }, 2000);
      };
      return `
        <div style="text-align:center">
          <p class="eyebrow">Note III — A Pause</p>
          <div style="font-size:2.5rem;margin:1rem 0">⏳</div>
          <p class="pause-text" id="pause-text">"This moment matters.<br>Because <em>you</em> matter."</p>
          <p class="sub-text" id="sub-text">— today is entirely yours</p>
          <div id="nxt-pause" style="display:none;margin-top:2.5rem">${btn('The Last Note')}</div>
        </div>
      `;
    },
 
    // 5 — birthday finale
    ()=>{
      window.__stepInit = ()=>{
        const lb = document.getElementById('later-btn');
        const lr = document.getElementById('later-reveal');
        if(!lb) return;
        lb.addEventListener('click',()=>{
          lr.style.display='block';
          lb.disabled=true; lb.style.opacity='0.4';
          sparkle(18,['🤍','✨','🌸','💫']);
        });
      };
      return `
        <div style="text-align:center">
          <p class="eyebrow">Note IV — The Final Word</p>
          <div class="name-display" style="margin-bottom:.4rem">Anfal</div>
          <div class="deco-divider"><span>✦ ✦ ✦</span></div>
          <h2 class="display-h" style="margin-bottom:1rem">Happy Birthday<br><em>to the main character.</em></h2>
          <div class="quote-block">
            <p>"I'm genuinely glad you exist. The world is quieter, warmer, and better with you in it."</p>
          </div>
          <p class="body-text" style="margin:1.2rem 0 2rem">Every ordinary day is a little more cinematic<br>simply because you're in it.</p>
 
          <button class="btn-ghost" id="later-btn">🌙 &nbsp; One last thing…</button>
          <div class="later-reveal" id="later-reveal">
            "Even after today — long after the cake and the candles — I'll still be here.<br>Always." 🤍
          </div>
        </div>
      `;
    },
  ];
 
  renderDots();
  render();
</script>
</body>
</html>
